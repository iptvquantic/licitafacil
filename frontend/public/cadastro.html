<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta — LicitaFácil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap">
  <link rel="stylesheet" href="css/app.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 50% at 80% 30%, rgba(124,58,237,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,212,255,0.07) 0%, transparent 60%);
    }
    .auth-container {
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; gap: 20px;
      position: relative; z-index: 1;
    }
    .auth-logo { display: flex; align-items: center; gap: 10px; justify-content: center; }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 32px;
      box-shadow: var(--shadow-lg);
    }
    .auth-title { font-family: var(--font-h); font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .auth-subtitle { text-align: center; color: var(--text2); font-size: 0.875rem; margin-bottom: 20px; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .perks {
      display: flex; flex-direction: column; gap: 8px;
      background: var(--surface2); border-radius: var(--r); padding: 14px;
      margin-bottom: 4px;
    }
    .perk {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.82rem; color: var(--text2);
    }
    .perk-icon { color: var(--accent3); font-size: 0.85rem; flex-shrink: 0; }
    .auth-footer { text-align: center; font-size: 0.85rem; color: var(--text2); }
    .auth-footer a { color: var(--accent); font-weight: 600; }
    .badge-trial {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-size: 0.78rem; font-weight: 700;
      padding: 4px 12px; border-radius: 99px;
      letter-spacing: 0.03em;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-mark">LF</div>
      <div class="logo-text">Licita<span>Fácil</span></div>
    </div>

    <div style="text-align:center;">
      <span class="badge-trial">✨ 15 dias grátis — sem cartão</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Criar conta</h1>
      <p class="auth-subtitle">Comece a gerenciar seus fornecedores com IA</p>

      <div class="perks">
        <div class="perk"><span class="perk-icon">✓</span> Busca inteligente em catálogos de PDF</div>
        <div class="perk"><span class="perk-icon">✓</span> Resposta automática via IA sobre produtos</div>
        <div class="perk"><span class="perk-icon">✓</span> Multi-fornecedor com extração de contatos</div>
      </div>

      <form class="auth-form" id="form-cadastro">
        <div class="form-group">
          <label class="form-label" for="nome">Nome completo</label>
          <input class="input" type="text" id="nome" placeholder="Seu nome" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="input" type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <input class="input" type="password" id="senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
        </div>

        <div id="erro-msg" class="form-error" style="display:none;"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-cadastro">
          Criar conta grátis
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Já tem conta? <a href="login.html">Entrar</a>
      &nbsp;·&nbsp;
      <a href="planos.html">Ver planos</a>
    </div>
  </div>

  <script src="js/utils.js?v=2"></script>
  <script>
    redirectIfLoggedIn();

    document.getElementById('form-cadastro').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = document.getElementById('btn-cadastro');
      var errEl = document.getElementById('erro-msg');
      errEl.style.display = 'none';

      var nome  = document.getElementById('nome').value.trim();
      var email = document.getElementById('email').value.trim();
      var senha = document.getElementById('senha').value;

      if (senha.length < 6) {
        errEl.textContent = 'A senha deve ter pelo menos 6 caracteres';
        errEl.style.display = 'block';
        return;
      }

      setLoading(btn, true, 'Criando conta...');

      apiPost('/api/auth/cadastro', { nome: nome, email: email, senha: senha }).then(function(data) {
        showToast('Conta criada! Bem-vindo ao LicitaFácil!', 'success');
        localStorage.setItem('lf_token', data.token); setTimeout(function() { window.location.href = '/' ; }, 300);
      }).catch(function(err) {
        setLoading(btn, false, 'Criar conta grátis');
        var msg = err && err.error ? err.error : 'Erro ao criar conta. Tente novamente.';
        errEl.textContent = msg;
        errEl.style.display = 'block';
      });
    });
  </script>
</body>
</html>
